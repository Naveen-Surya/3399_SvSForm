<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SVS Prep Registration</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Rajdhani', sans-serif;
      background:
      linear-gradient(rgba(5,10,20,0.92), rgba(5,10,20,0.95)),
      url('https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-attachment:fixed;
      color:white;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:rgba(15,23,42,0.95);
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(96,165,250,0.25);
      box-shadow:
      0 0 40px rgba(37,99,235,0.25),
      0 0 80px rgba(0,0,0,0.6);
    }

    .header{
      padding:40px;
      text-align:center;
      background:
      linear-gradient(135deg,#2563eb,#0f172a);
    }

    .header h1{
      font-family:'Orbitron', sans-serif;
      font-size:42px;
      letter-spacing:2px;
      margin-bottom:12px;
    }

    .header p{
      font-size:20px;
      color:#dbeafe;
    }

    form{
      padding:30px;
    }

    .section{
      margin-bottom:35px;
      padding:25px;
      border-radius:20px;
      background:rgba(30,41,59,0.92);
    }

    .section h2{
      font-family:'Orbitron', sans-serif;
      color:#60a5fa;
      margin-bottom:24px;
      font-size:24px;
      border-left:5px solid #3b82f6;
      padding-left:14px;
    }

    .field{
      margin-bottom:24px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:18px;
      font-weight:600;
      color:#e2e8f0;
    }

    input,
    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#334155;
      color:white;
      font-size:16px;
      outline:none;
    }

    input:focus,
    select:focus{
      box-shadow:0 0 0 2px #60a5fa;
    }

    .note{
      margin-top:8px;
      color:#93c5fd;
      font-size:14px;
      font-weight:600;
    }

    .checkbox-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
      margin-top:12px;
    }

    .checkbox-item{
      background:#334155;
      padding:12px 14px;
      border-radius:12px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .checkbox-item:hover{
      background:#475569;
      transform:translateY(-2px);
    }

    .checkbox-item input{
      width:auto;
      transform:scale(1.2);
    }

    .multi-note{
      margin-top:10px;
      color:#93c5fd;
      font-size:14px;
      font-weight:600;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:
      linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
      font-size:22px;
      font-family:'Orbitron', sans-serif;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 0 25px rgba(96,165,250,0.5);
    }

    @media(max-width:768px){

      .header h1{
        font-size:30px;
      }

      .header p{
        font-size:16px;
      }

      form{
        padding:20px;
      }

      .section{
        padding:18px;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">

    <h1>🔥 SVS PREP REGISTRATION 🔥</h1>

    <p>
      Track alliance preparation resources & availability
    </p>

  </div>

  <!-- NETLIFY FORM -->
  <form
    name="svs-prep-form"
    method="POST"
    data-netlify="true"
  >

    <input
      type="hidden"
      name="form-name"
      value="svs-prep-form"
    >

    <!-- PLAYER INFO -->
    <div class="section">

      <h2>👤 Player Information</h2>

      <div class="field">

        <label>Player Name</label>

        <input
          type="text"
          name="playerName"
          required
        >

      </div>

      <div class="field">

        <label>Player ID</label>

        <input
          type="text"
          name="playerId"
          required
        >

      </div>

      <div class="field">

        <label>Alliance</label>

        <select
          name="alliance"
          id="allianceSelect"
          onchange="toggleOtherAlliance()"
        >

          <option value="">Select Alliance</option>
          <option value="WAR">WAR</option>
          <option value="PWU">PWU</option>
          <option value="BAD">BAD</option>
          <option value="ROG">ROG</option>
          <option value="Other">Other</option>

        </select>

      </div>

      <div
        class="field"
        id="otherAllianceField"
        style="display:none;"
      >

        <label>Enter Alliance Name</label>

        <input
          type="text"
          name="otherAlliance"
        >

      </div>

    </div>

    <!-- RESOURCE INFO -->
    <div class="section">

      <h2>🔥 SVS Resources</h2>

      <div class="field">

        <label>Number of Fire Crystals</label>

        <input
          type="number"
          name="fireCrystals"
          min="0"
        >

        <div class="note">
          💡 If all your buildings are FC5, enter 0
        </div>

      </div>

      <div class="field">

        <label>Number of Fire Crystal Shards</label>

        <input
          type="number"
          name="fireCrystalShards"
          min="0"
        >

      </div>

      <div class="field">

        <label>Construction Speedups (Days)</label>

        <input
          type="number"
          name="constructionSpeedups"
          min="0"
          placeholder="Example: 120"
        >

      </div>

      <div class="field">

        <label>Troop Training Speedups (Days)</label>

        <input
          type="number"
          name="troopTrainingSpeedups"
          min="0"
          placeholder="Example: 90"
        >

      </div>

      <div class="field">

        <label>Research Speedups (Days)</label>

        <input
          type="number"
          name="researchSpeedups"
          min="0"
          placeholder="Example: 75"
        >

      </div>

    </div>

    <!-- AVAILABILITY -->
    <div class="section">

      <h2>🕒 Availability (UTC)</h2>

      <div class="checkbox-grid">

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="00:00 - 01:59 UTC">
          00:00 - 01:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="02:00 - 03:59 UTC">
          02:00 - 03:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="04:00 - 05:59 UTC">
          04:00 - 05:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="06:00 - 07:59 UTC">
          06:00 - 07:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="08:00 - 09:59 UTC">
          08:00 - 09:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="10:00 - 11:59 UTC">
          10:00 - 11:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="12:00 - 13:59 UTC">
          12:00 - 13:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="14:00 - 15:59 UTC">
          14:00 - 15:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="16:00 - 17:59 UTC">
          16:00 - 17:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="18:00 - 19:59 UTC">
          18:00 - 19:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="20:00 - 21:59 UTC">
          20:00 - 21:59 UTC
        </label>

        <label class="checkbox-item">
          <input type="checkbox" name="availability" value="22:00 - 23:59 UTC">
          22:00 - 23:59 UTC
        </label>

      </div>

      <div class="multi-note">
        ✅ Multiple selections allowed
      </div>

    </div>

    <button type="submit">
      🚀 Submit SVS Prep Data
    </button>

  </form>

</div>

<script>

function toggleOtherAlliance(){

  const alliance =
    document.getElementById("allianceSelect").value;

  const otherField =
    document.getElementById("otherAllianceField");

  if(alliance === "Other"){

    otherField.style.display = "block";

  }

  else{

    otherField.style.display = "none";

  }

}

</script>

</body>
</html>
